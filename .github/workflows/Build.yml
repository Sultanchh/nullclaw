name: Build NullClaw
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Important if nullclaw uses submodules

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          zig-version: 0.13.0

      - name: Build for 32-bit Android (armv8l/armv7l)
        run: |
          zig build -Dtarget=arm-linux-androideabi -Doptimize=ReleaseSmall --summary all

      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-32bit-android
          path: zig-out/bin/nullclaw
          
