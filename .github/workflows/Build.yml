name: Ghost Compiler (32-bit ARM)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master 
      - name: Prepare Dependencies
        run: |
          # 1. Clean the environment to prevent "already exists" errors
          rm -rf vendor
          mkdir -p vendor
          
          # 2. Clone from the original sources (verified public)
          git clone https://github.com/nullclaw/websocket vendor/websocket
          git clone https://github.com/nullclaw/wasm3 vendor/wasm3
          
          # 3. Use the correct name for the sqlite repo. 
          # If 'sqlite' 404s, we try 'sqlite3'.
          git clone https://github.com/nullclaw/sqlite vendor/sqlite3 || git clone https://github.com/nullclaw/sqlite3 vendor/sqlite3

          # 4. Patch the .zon files for Zig 0.17.0-dev compatibility
          # We use "sed" to change .name = .something to .name = "something"
          find vendor -name "build.zig.zon" -exec sed -i 's/\.name = \.\([a-z0-9_]*\)/\.name = "\1"/g' {} +
          
            - name: Compile for 32-bit Android
        run: |
          zig build -Dtarget=arm-linux-androideabi -Doptimize=ReleaseSmall --summary all
          
      - name: Prepare Artifact
        run: |
          mkdir -p deploy
          # Note: Ensure zig-out/bin/nullclaw exists; Zig sometimes adds a suffix
          cp zig-out/bin/nullclaw deploy/nullclaw-android-32bit || cp zig-out/bin/nullclaw.exe deploy/nullclaw-android-32bit
          
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-ghost-binary
          path: deploy/nullclaw-android-32bit
