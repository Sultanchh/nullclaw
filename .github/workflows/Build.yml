name: Ghost Compiler (32-bit ARM)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master 
          
      - name: Prepare Dependencies
        run: |
          rm -rf vendor  # Prevent clone conflicts
          mkdir -p vendor
          # Clone all dependencies into the local vendor folder
          git clone https://github.com/Sultanchh/websocket vendor/websocket
          git clone https://github.com/Sultanchh/wasm3 vendor/wasm3
          git clone https://github.com/Sultanchh/sqlite vendor/sqlite3
          
          # Force older dependency files to use the new string syntax for Master
          sed -i 's/.name = .websocket/.name = "websocket"/' vendor/websocket/build.zig.zon || true
          sed -i 's/.name = .wasm3/.name = "wasm3"/' vendor/wasm3/build.zig.zon || true
          sed -i 's/.name = .sqlite/.name = "sqlite3"/' vendor/sqlite3/build.zig.zon || true

      - name: Compile for 32-bit Android
        run: |
          zig build -Dtarget=arm-linux-androideabi -Doptimize=ReleaseSmall --summary all
          
      - name: Prepare Artifact
        run: |
          mkdir -p deploy
          # Note: Ensure zig-out/bin/nullclaw exists; Zig sometimes adds a suffix
          cp zig-out/bin/nullclaw deploy/nullclaw-android-32bit || cp zig-out/bin/nullclaw.exe deploy/nullclaw-android-32bit
          
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-ghost-binary
          path: deploy/nullclaw-android-32bit
