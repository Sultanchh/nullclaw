name: Ghost Compiler (32-bit ARM)
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master # This will pull the latest 0.17.0-dev
          
      - name: Prepare Dependencies
        run: |
          mkdir -p vendor
          git clone https://github.com/nullclaw/websocket vendor/websocket
          git clone https://github.com/nullclaw/wasm3 vendor/wasm3
          
          # Fix the dependency syntax manually if it's broken
          sed -i 's/.name = .websocket/.name = "websocket"/' vendor/websocket/build.zig.zon || true
          sed -i 's/.name = .wasm3/.name = "wasm3"/' vendor/wasm3/build.zig.zon || true

      - name: Compile for 32-bit Android
        run: |
          zig build -Dtarget=arm-linux-androideabi -Doptimize=ReleaseSmall --summary all
          
      - name: Prepare Artifact
        run: |
          mkdir -p deploy
          cp zig-out/bin/nullclaw deploy/nullclaw-android-32bit
          
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-ghost-binary
          path: deploy/nullclaw-android-32bit
          
